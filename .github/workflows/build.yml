name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v2
      with:
        api-level: 33
        build-tools: 33.0.2
        cmdline-tools: latest
        platform-tools: latest

    - name: Install Cordova
      run: npm install -g cordova@12.0.0

    - name: Install dependencies
      run: npm install

    - name: Add Android platform
      run: cordova platform add android@12.0.1 --no-confirm

    - name: Accept Android licenses
      run: yes | sdkmanager --licenses || true

    - name: Build Debug APK
      run: cordova build android --debug

    - name: Build Release APK
      run: |
        if [ -n "${{ secrets.KEYSTORE_FILE }}" ]; then
          echo "Signing with provided keystore..."
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > release.keystore
          cordova build android --release -- --keystore=release.keystore --storePassword=${{ secrets.KEYSTORE_PASSWORD }} --alias=${{ secrets.KEY_ALIAS }} --password=${{ secrets.KEY_PASSWORD }}
        else
          echo "Building unsigned release APK..."
          cordova build android --release
        fi

    - name: Upload Debug APK
      uses: actions/upload-artifact@v3
      with:
        name: kinoxana-debug-apk
        path: platforms/android/app/build/outputs/apk/debug/*.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v3
      with:
        name: kinoxana-release-apk
        path: platforms/android/app/build/outputs/apk/release/*.apk

    - name: Get version
      id: version
      run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          platforms/android/app/build/outputs/apk/debug/*.apk
          platforms/android/app/build/outputs/apk/release/*.apk
        body: |
          ## كىنوخانا v${{ steps.version.outputs.version }}
          
          Android ئەسلىمىسى
        draft: false
        prerelease: false
